// ---- check-in (담당자 이름) ----
const isMobile=/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
const devKey=isMobile?'mobile':'pc', devLabel=isMobile?'📱 모바일':'💻 PC';
function saveName(v){v=(v||'').trim();if(!v)return;
  const rec={name:v,time:(now.getMonth()+1)+'/'+now.getDate()+' '+pad(now.getHours())+':'+pad(now.getMinutes())};
  localStorage.setItem('checkin_'+devKey,JSON.stringify(rec));renderCheckin();}
function renderCheckin(edit){
  const saved=JSON.parse(localStorage.getItem('checkin_'+devKey)||'null');
  const box=document.getElementById('checkin');
  if(saved&&saved.name&&!edit){
    box.innerHTML='<span class="dev">'+devLabel+' 접속자</span><span class="nm">'+esc(saved.name)+'</span><button class="cibtn" id="ciEdit">변경</button>';
    document.getElementById('ciEdit').onclick=()=>renderCheckin(true);
  }else{
    box.innerHTML='<span class="dev">'+devLabel+' 접속자</span><input id="ciSel" type="text" placeholder="이름 입력" value="'+(saved?esc(saved.name):'')+'" style="width:90px"><button class="cibtn" id="ciSave">확인</button>';
    const el=document.getElementById('ciSel');el.focus();
    document.getElementById('ciSave').onclick=()=>saveName(el.value);
    el.addEventListener('keydown',e=>{if(e.key==='Enter')saveName(el.value)});
  }
}
renderCheckin();
// ---- first-visit name modal ----
(function(){
  const saved=JSON.parse(localStorage.getItem('checkin_'+devKey)||'null');
  if(saved&&saved.name)return;
  const ovl=document.getElementById('nameOvl');
  document.getElementById('mDev').textContent=devLabel;
  ovl.style.display='flex';
  function save(name){if(!name||!name.trim())return;
    const rec={name:name.trim(),time:(now.getMonth()+1)+'/'+now.getDate()+' '+pad(now.getHours())+':'+pad(now.getMinutes())};
    localStorage.setItem('checkin_'+devKey,JSON.stringify(rec));renderCheckin();ovl.style.display='none';}
  document.getElementById('mOk').onclick=()=>save(document.getElementById('mInput').value);
  document.getElementById('mInput').addEventListener('keydown',e=>{if(e.key==='Enter')save(e.target.value)});
})();

// ---- calendar ----
const keys=Object.keys(AGG).sort();
const months=[...new Set(keys.map(k=>k.slice(0,7)))];
const mt=document.getElementById('monthTabs');
let curMonth=months.includes(todayKey.slice(0,7))?todayKey.slice(0,7):(months[months.length-1]||todayKey.slice(0,7));
months.forEach(m=>{const mm=+m.split('-')[1];const b=document.createElement('button');b.className='tab';b.dataset.m=m;b.textContent=mm+'월';b.onclick=()=>{curMonth=m;syncTabs();renderCal()};mt.appendChild(b)});
function syncTabs(){[...mt.children].forEach(c=>c.classList.toggle('on',c.dataset.m===curMonth))}
syncTabs();
function renderCal(hlDate){
  const[y,m]=curMonth.split('-').map(Number);
  const first=new Date(y,m-1,1),dim=new Date(y,m,0).getDate();
  let cells=[],startW=(first.getDay()+6)%7;
  for(let i=0;i<startW;i++)cells.push(0);
  for(let d=1;d<=dim;d++)cells.push(d);
  while(cells.length%7)cells.push(0);
  let html='<table class="cal"><tr>'+['월','화','수','목','금'].map(d=>'<th>'+d+'</th>').join('')+'</tr>';
  for(let w=0;w<cells.length/7;w++){html+='<tr>';
    for(let i=0;i<5;i++){const day=cells[w*7+i];
      if(!day){html+='<td class="empty"></td>';continue}
      const key=y+'-'+pad(m)+'-'+pad(day);const cls=(key===todayKey?'today ':'')+(key===hlDate?'hl':'');
      if(AGG[key]){const d=AGG[key];const tdcls=(cls+(d.all_done?' alldone':'')).trim();
        let badge=d.all_done?'<span class="donebadge">✓완료</span>':(d.done>0?'<span class="partbadge">완료 '+d.done+'/'+d.total+'</span>':'');
        let c='<td class="'+tdcls+'"><div class="dn"><span>'+day+'</span><span>'+badge+'<span class="cnt">'+d.total+'건</span></span></div>';
        d.vendors.forEach(v=>{const pc=COL[v.products[0].name]||'#475569';const pl=v.products.map(p=>(SHORT[p.name]||p.name)+'<b>'+p.qty+'</b>').join(' ');
          c+='<div class="it'+(v.done?' done':'')+'" style="--c:'+pc+'"><span class="vn2">'+esc(v.vendor)+'</span> <span class="pq">'+pl+'</span></div>'});
        c+='</td>';html+=c;
      }else html+='<td class="'+cls.trim()+'"><div class="dn"><span>'+day+'</span></div></td>';
    }html+='</tr>';}
  html+='</table>';document.getElementById('calBox').innerHTML=html;
}
renderCal();
</script></body></html>
