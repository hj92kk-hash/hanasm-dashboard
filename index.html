const SHORT={'슬림디자인게시판':'슬림디자인','슬림업게시판':'슬림업','강화유리게시판':'강화유리','인포메이션':'인포'};
const TEAM=[];
function pad(n){return String(n).padStart(2,'0')}
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
const now=new Date();
const todayKey=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
const WK=['일','월','화','수','목','금','토'];

// ---- CHECKLIST (date navigable) ----
let selDate=todayKey;
function renderChecklist(key){
  selDate=key;
  const[Y,M,D]=key.split('-').map(Number);const dObj=new Date(Y,M-1,D);
  const isToday=key===todayKey;
  document.getElementById('todayDate').textContent=M+'/'+D+' ('+WK[dObj.getDay()]+')'+(isToday?' · 오늘':'');
  document.getElementById('datePick').value=key;
  const rows=DET[key]||[];const tq=rows.reduce((s,r)=>s+(+r.qty||0),0);
  if(rows.length){
    const dn=rows.filter(r=>r.done).length;document.getElementById('todaySum').innerHTML='총 '+rows.length+'건 · '+tq+'개 <span style="color:#16a34a;font-weight:700">(완료 '+dn+')</span>';
    let h='<table class="ttbl"><colgroup><col class="c-ck"><col class="c-st"><col class="c-gb"><col class="c-vn"><col class="c-pd"><col class="c-sz"><col class="c-qt"><col class="c-sh"><col class="c-tel"><col class="c-ad"></colgroup><thead><tr><th class="ck">✓</th><th>상태</th><th>구분</th><th>업체명</th><th>상품</th><th>사이즈</th><th class="qty">수량</th><th>배송</th><th>연락처</th><th>주소</th></tr></thead><tbody>';
    rows.forEach(r=>{const c=COL[r.product]||'#475569';
      const st=r.done?'<span class="stchip" style="background:#16a34a">출고완료</span>':'<span class="stchip" style="background:#dc2626">대기</span>';
      h+='<tr class="'+(r.done?'done':'')+'"><td class="ck"><input type="checkbox"'+(r.done?' checked':'')+'></td>'+
         '<td class="detail" data-label="상태">'+st+'</td>'+
         '<td class="detail" data-label="구분"><span class="stchip" style="background:'+(SRCCOL[r.src]||'#64748b')+'">'+esc(r.src||'')+'</span></td>'+
         '<td class="vn" data-label="업체">'+esc(r.vendor)+'</td>'+
         '<td data-label="상품"><span class="chip" style="background:'+c+'">'+esc(SHORT[r.product]||r.product)+'</span></td>'+
         '<td class="detail" data-label="사이즈">'+esc(r.size||'-')+'</td><td class="qty" data-label="수량">'+esc(r.qty)+'</td><td data-label="배송">'+esc(r.ship||'-')+'</td>'+
         '<td class="tel detail" data-label="연락처">'+esc(r.tel||'-')+'</td><td class="detail" data-label="주소">'+esc(r.addr||'-')+'</td></tr>'});
    h+='</tbody></table>';
    document.getElementById('todayBox').innerHTML=h;
  }else document.getElementById('todayBox').innerHTML='<div class="none">'+M+'/'+D+' 출고 예정 건이 없습니다.</div>';
}
function shiftDate(delta){const[Y,M,D]=selDate.split('-').map(Number);const d=new Date(Y,M-1,D);d.setDate(d.getDate()+delta);
  renderChecklist(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()))}
document.getElementById('prevD').onclick=()=>shiftDate(-1);
document.getElementById('nextD').onclick=()=>shiftDate(1);
document.getElementById('todayBtn').onclick=()=>renderChecklist(todayKey);
document.getElementById('datePick').onchange=function(){if(this.value)renderChecklist(this.value)};
renderChecklist(todayKey);

// ---- vendor index for search ----
let VEND={};
function buildVendorIndex(){VEND={};Object.keys(DET).forEach(k=>{DET[k].forEach(r=>{(VEND[r.vendor]=VEND[r.vendor]||[]).push({date:k,qty:+r.qty||0})})})}
buildVendorIndex();
const sEl=document.getElementById('search'),sRes=document.getElementById('sresults');
function fmt(d){const[y,m,dd]=d.split('-');return +m+'/'+dd+' ('+WK[new Date(+y,+m-1,+dd).getDay()]+')'}
sEl.addEventListener('input',()=>{
  const q=sEl.value.trim();if(!q){sRes.classList.remove('on');return}
  const hits=Object.keys(VEND).filter(v=>v.includes(q)).slice(0,30);
  if(!hits.length){sRes.innerHTML='<div class="sr none">검색 결과 없음</div>';sRes.classList.add('on');return}
  sRes.innerHTML=hits.map(v=>{
    const byDate={};VEND[v].forEach(x=>byDate[x.date]=(byDate[x.date]||0)+x.qty);
    const ds=Object.keys(byDate).sort().map(d=>'<b>'+fmt(d)+'</b> '+byDate[d]+'개').join(' · ');
    return '<div class="sr" data-d="'+Object.keys(byDate).sort()[0]+'"><div class="v">'+esc(v)+'</div><div class="d">출고일: '+ds+'</div></div>';
  }).join('');
  sRes.classList.add('on');
  [...sRes.querySelectorAll('.sr[data-d]')].forEach(el=>el.onclick=()=>{
    const d=el.getAttribute('data-d');const mk=d.slice(0,7);
    if(months.includes(mk)){curMonth=mk;syncTabs();renderCal(d)}
    sRes.classList.remove('on');sEl.value='';
  });
});
document.addEventListener('click',e=>{if(!e.target.closest('.searchbox'))sRes.classList.remove('on')});

// ---- check-in (담당자 이름) ----
const isMobile=/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
const devKey=isMobile?'mobile':'pc', devLabel=isMobile?'📱 모바일':'💻 PC';
function saveName(v){v=(v||'').trim();if(!v)return;
  const rec={name:v,time:(now.getMonth()+1)+'/'+now.getDate()+' '+pad(now.getHours())+':'+pad(now.getMinutes())};
  localStorage.setItem('checkin_'+devKey,JSON.stringify(rec));renderCheckin();}
function renderCheckin(edit){
  const saved=JSON.parse(localStorage.getItem('checkin_'+devKey)||'null');
  const box=document.getElementById('checkin');
  if(saved&&saved.name&&!edit){
    box.innerHTML='<span class="dev">'+devLabel+' 접속자</span><span class="nm">'+esc(saved.name)+'</span><button class="cibtn" id="ciEdit">변경</button>';
    document.getElementById('ciEdit').onclick=()=>renderCheckin(true);
  }else{
    box.innerHTML='<span class="dev">'+devLabel+' 접속자</span><input id="ciSel" type="text" placeholder="이름 입력" value="'+(saved?esc(saved.name):'')+'" style="width:90px"><button class="cibtn" id="ciSave">확인</button>';
    const el=document.getElementById('ciSel');el.focus();
    document.getElementById('ciSave').onclick=()=>saveName(el.value);
    el.addEventListener('keydown',e=>{if(e.key==='Enter')saveName(el.value)});
  }
}
renderCheckin();
// ---- first-visit name modal ----
(function(){
  const saved=JSON.parse(localStorage.getItem('checkin_'+devKey)||'null');
  if(saved&&saved.name)return;
  const ovl=document.getElementById('nameOvl');
  document.getElementById('mDev').textContent=devLabel;
  ovl.style.display='flex';
  function save(name){if(!name||!name.trim())return;
    const rec={name:name.trim(),time:(now.getMonth()+1)+'/'+now.getDate()+' '+pad(now.getHours())+':'+pad(now.getMinutes())};
    localStorage.setItem('checkin_'+devKey,JSON.stringify(rec));renderCheckin();ovl.style.display='none';}
  document.getElementById('mOk').onclick=()=>save(document.getElementById('mInput').value);
  document.getElementById('mInput').addEventListener('keydown',e=>{if(e.key==='Enter')save(e.target.value)});
})();

// ---- calendar ----
let months=[],curMonth=todayKey.slice(0,7);
const mt=document.getElementById('monthTabs');
function buildMonthTabs(){
  const keys=Object.keys(AGG).sort();
  months=[...new Set(keys.map(k=>k.slice(0,7)))];
  curMonth=months.includes(todayKey.slice(0,7))?todayKey.slice(0,7):(months[months.length-1]||todayKey.slice(0,7));
  mt.innerHTML='';
  months.forEach(m=>{const mm=+m.split('-')[1];const b=document.createElement('button');b.className='tab';b.dataset.m=m;b.textContent=mm+'월';b.onclick=()=>{curMonth=m;syncTabs();renderCal()};mt.appendChild(b)});
  syncTabs();
}
function syncTabs(){[...mt.children].forEach(c=>c.classList.toggle('on',c.dataset.m===curMonth))}
buildMonthTabs();
function renderCal(hlDate){
  const[y,m]=curMonth.split('-').map(Number);
  const first=new Date(y,m-1,1),dim=new Date(y,m,0).getDate();
  let cells=[],startW=(first.getDay()+6)%7;
  for(let i=0;i<startW;i++)cells.push(0);
  for(let d=1;d<=dim;d++)cells.push(d);
  while(cells.length%7)cells.push(0);
  let html='<table class="cal"><tr>'+['월','화','수','목','금'].map(d=>'<th>'+d+'</th>').join('')+'</tr>';
  for(let w=0;w<cells.length/7;w++){html+='<tr>';
    for(let i=0;i<5;i++){const day=cells[w*7+i];
      if(!day){html+='<td class="empty"></td>';continue}
      const key=y+'-'+pad(m)+'-'+pad(day);const cls=(key===todayKey?'today ':'')+(key===hlDate?'hl':'');
      if(AGG[key]){const d=AGG[key];const tdcls=(cls+(d.all_done?' alldone':'')).trim();
        let badge=d.all_done?'<span class="donebadge">✓완료</span>':'';
        const sc=d.src||{};
        const scStr=Object.keys(sc).map(k=>'<span style="color:'+(SRCCOL[k]||'#334155')+'">'+k+' '+sc[k]+'</span>').join(' / ');
        let c='<td class="'+tdcls+'"><div class="dn"><span>'+day+'</span><span>'+badge+'<span class="srccnt">'+scStr+'</span></span></div>';
        d.vendors.forEach(v=>{const pc=COL[v.products[0].name]||'#475569';const pl=v.products.map(p=>(SHORT[p.name]||p.name)+'<b>'+p.qty+'</b>').join(' ');
          const st=v.src?'<span class="srctag" style="background:'+(SRCCOL[v.src]||'#64748b')+'">'+esc(v.src[0])+'</span>':'';
          c+='<div class="it'+(v.done?' done':'')+'" style="--c:'+pc+'">'+st+'<span class="vn2">'+esc(v.vendor)+'</span> <span class="pq">'+pl+'</span></div>'});
        c+='</td>';html+=c;
      }else html+='<td class="'+cls.trim()+'"><div class="dn"><span>'+day+'</span></div></td>';
    }html+='</tr>';}
  html+='</table>';document.getElementById('calBox').innerHTML=html;
}
renderCal();
// mobile: tap row to expand details
document.getElementById('todayBox').addEventListener('click',e=>{
  if(e.target.closest('input'))return;
  const tr=e.target.closest('tr'); if(tr&&tr.parentElement.tagName==='TBODY')tr.classList.toggle('open');
});
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}</script>
</body></html>
