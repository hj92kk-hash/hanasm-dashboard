<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1e293b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="출고대시보드">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>게시판+오뚜기 출고 대시보드 | 하나사인몰</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Malgun Gothic','맑은 고딕',sans-serif;color:#0f172a;background:#eef1f5}
.wrap{max-width:1180px;margin:0 auto;padding:18px 16px 60px}
header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:14px}
h1{font-size:22px}
.subt{font-size:12px;color:#64748b;margin-top:3px}
.hright{display:flex;flex-direction:row;flex-wrap:wrap;align-items:center;justify-content:flex-end;gap:8px}
.searchbox{position:relative}
.searchbox input{width:240px;max-width:60vw;font-size:13px;padding:8px 12px;border:1px solid #cbd5e1;border-radius:8px;outline:none}
.searchbox input:focus{border-color:#1e293b}
.sresults{position:absolute;right:0;top:40px;width:330px;max-width:80vw;background:#fff;border:1px solid #cbd5e1;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.15);z-index:30;max-height:320px;overflow:auto;display:none}
.sresults.on{display:block}
.sr{padding:9px 12px;border-bottom:1px solid #f1f5f9;cursor:pointer}
.sr:hover{background:#f8fafc}
.sr .v{font-weight:800;font-size:13px}
.sr .d{font-size:12px;color:#475569;margin-top:2px}
.sr .d b{color:#dc2626}
.sr.none{color:#94a3b8;cursor:default;font-size:13px}
.btn{font-size:13px;font-weight:700;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;background:#1e293b;color:#fff}
.checkin{display:flex;align-items:center;gap:7px;font-size:12px;background:#fff;border:1px solid #cbd5e1;border-radius:8px;padding:6px 9px}
.checkin .dev{font-weight:800}
.checkin select,.checkin input{font-size:12px;border:1px solid #cbd5e1;border-radius:6px;padding:4px 6px}
.checkin .last{color:#64748b}
.checkin .nm{font-weight:800;color:#0f172a}
.checkin .cibtn{font-size:11px;border:1px solid #cbd5e1;background:#fff;border-radius:6px;padding:2px 7px;cursor:pointer;color:#475569}
.panel{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:18px}
.ptitle{font-size:16px;font-weight:800;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.tabs{display:flex;gap:6px}
.tab{font-size:12.5px;font-weight:700;border:1px solid #cbd5e1;background:#fff;color:#475569;border-radius:7px;padding:5px 12px;cursor:pointer}
.tab.on{background:#1e293b;color:#fff;border-color:#1e293b}
.datenav{display:flex;align-items:center;gap:6px;font-size:13px;color:#64748b}
.datenav button{font-size:13px;font-weight:700;border:1px solid #cbd5e1;background:#fff;border-radius:6px;padding:4px 9px;cursor:pointer}
.datenav button#todayBtn{background:#1e293b;color:#fff;border-color:#1e293b}
.datenav input[type=date]{font-size:13px;border:1px solid #cbd5e1;border-radius:6px;padding:4px 6px}
#todayPanel{border:2px solid #dc2626}
.tbadge{font-size:12px;font-weight:800;background:#dc2626;color:#fff;border-radius:7px;padding:3px 10px}
.ttbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.ttbl th{background:#1e293b;color:#fff;text-align:left;padding:6px 8px;font-size:12px;white-space:nowrap}
.ttbl td{padding:4px 8px;border-bottom:1px solid #e8edf3;vertical-align:middle;word-break:break-word;line-height:1.25}
.ttbl tr:nth-child(even) td{background:#f8fafc}
.ttbl .ck{text-align:center;width:34px}
.ttbl .qty{text-align:center;font-weight:800;width:46px}
.ttbl .vn{font-weight:800;white-space:normal;line-height:1.3}
.ttbl .tel{white-space:nowrap}
.chip{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;color:#fff;white-space:nowrap}
.none{color:#64748b;font-size:14px;padding:10px 2px}
.legend{font-size:12px;color:#475569;margin-bottom:10px}
.legend span{margin-right:13px;white-space:nowrap}
.legend i{display:inline-block;width:11px;height:11px;border-radius:2px;vertical-align:-1px;margin-right:4px}
table.cal{width:100%;border-collapse:collapse;table-layout:fixed}
table.cal th{background:#1e293b;color:#fff;font-size:13px;padding:6px 0;border:1px solid #1e293b}
table.cal td{border:1.2px solid #94a3b8;vertical-align:top;width:20%;height:118px;padding:4px 6px;overflow:hidden}
td.empty{background:#f8fafc}
td.today{outline:3px solid #dc2626;outline-offset:-3px}
td.hl{background:#fff7d6}
.dn{font-size:14px;font-weight:800;color:#334155;border-bottom:1px solid #e2e8f0;padding-bottom:3px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.cnt{font-size:11px;font-weight:800;background:#1e293b;color:#fff;border-radius:9px;padding:1px 9px}
.srccnt{font-size:10.5px;font-weight:800;white-space:nowrap}
.it{font-size:10.5px;line-height:1.32;margin-bottom:3px;padding-left:10px;position:relative}
.it.hl{background:#fde68a;border-radius:3px}
.it::before{content:'';position:absolute;left:0;top:4px;width:6px;height:6px;border-radius:1px;background:var(--c)}
.vn2{font-weight:800}.pq{color:#475569}.pq b{color:#0f172a;font-weight:800}
.it.done{opacity:.5}.it.done .vn2{text-decoration:line-through}
.donebadge{font-size:10px;font-weight:800;background:#16a34a;color:#fff;border-radius:8px;padding:1px 7px;margin-left:4px}
.srctag{display:inline-block;font-size:9px;font-weight:800;color:#fff;border-radius:3px;padding:0 4px;margin-right:3px;vertical-align:1px}
.partbadge{font-size:10px;font-weight:800;background:#64748b;color:#fff;border-radius:8px;padding:1px 6px;margin-left:4px}
td.alldone{background:#f0fdf4}
.ttbl tr.done td{opacity:.55}.ttbl tr.done .vn{text-decoration:line-through}
.stchip{display:inline-block;font-size:10px;font-weight:800;border-radius:5px;padding:2px 7px;color:#fff;white-space:nowrap}
.ttbl col.c-ck{width:30px}.ttbl col.c-st{width:62px}.ttbl col.c-gb{width:52px}.ttbl col.c-vn{width:18%}
.ttbl col.c-pd{width:92px}.ttbl col.c-sz{width:126px}.ttbl col.c-qt{width:42px}.ttbl col.c-sh{width:46px}.ttbl col.c-tel{width:108px}
.ttbl td.ck,.ttbl td.qty,.ttbl td[data-label='상태'],.ttbl td[data-label='구분']{text-align:center}
.ttbl td.ship{white-space:nowrap;text-align:center}
.quick{display:inline-block;background:#dc2626;color:#fff;font-weight:800;border-radius:5px;padding:1px 7px;font-size:11px;white-space:nowrap}
.ttbl td.tel{white-space:nowrap;font-size:12px}
.ttbl th{white-space:nowrap}
.foot{font-size:11px;color:#94a3b8;text-align:center;margin-top:14px}
.ovl{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:#fff;border-radius:14px;padding:24px;width:380px;max-width:92vw;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.modal h2{font-size:18px;margin-bottom:6px}
.modal p{font-size:13px;color:#64748b;margin-bottom:16px}
.modal .dev{font-weight:800;color:#0f172a}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.chips button{font-size:14px;font-weight:700;border:1.5px solid #cbd5e1;background:#fff;color:#0f172a;border-radius:9px;padding:9px 14px;cursor:pointer}
.chips button:hover{border-color:#1e293b;background:#f8fafc}
.modal .ni{width:100%;font-size:14px;padding:10px 12px;border:1.5px solid #cbd5e1;border-radius:9px;margin-bottom:14px}
.modal .ok{width:100%;font-size:15px;font-weight:800;border:none;border-radius:9px;padding:11px;background:#1e293b;color:#fff;cursor:pointer}
@media print{@page{size:A4 landscape;margin:8mm}body{background:#fff}.wrap{max-width:none;padding:0}
 #printbtn,.foot,.searchbox,.checkin{display:none}.panel{box-shadow:none}
 table.cal{height:165mm}table.cal td{height:auto}}
@media(max-width:680px){
 table.cal td{height:auto;min-height:78px}
 header{flex-direction:column}.hright{align-items:stretch;width:100%;justify-content:flex-start}.searchbox input{width:100%;max-width:none}
 /* checklist: 한 줄 요약(업체/상품/수량), 탭하면 펼침 */
 .ttbl thead{display:none}
 .ttbl,.ttbl tbody{display:block;width:100%}
 .ttbl tr{display:flex;flex-wrap:wrap;align-items:center;gap:6px;border:1px solid #cbd5e1;border-radius:9px;margin-bottom:6px;padding:7px 10px;background:#fff;cursor:pointer}
 .ttbl tr:nth-child(even) td{background:transparent}
 .ttbl td{display:none;border:none;padding:0;font-size:13px;white-space:normal!important}
 .ttbl td::before{display:none}
 .ttbl td.ck{display:none}
 /* summary line */
 .ttbl td.vn{display:inline-flex;flex:1 1 auto;min-width:0;font-weight:800;font-size:14px;align-items:center;line-height:1.2}
 .ttbl td[data-label='상품']{display:inline-flex;flex:0 0 auto;align-items:center}
 .ttbl td.qty{display:inline-flex;flex:0 0 auto;font-weight:800;align-items:center}
 .ttbl td.qty::before{content:'×';color:#64748b;margin-right:1px}
 .ttbl td.qty::after{content:'▸';margin-left:8px;color:#2563eb;font-weight:800}
 .ttbl tr.open td.qty::after{content:'▾'}
 /* details when open */
 .ttbl tr.open td.detail{display:flex;flex-basis:100%;width:100%;gap:8px;padding:3px 2px;font-size:13px;align-items:flex-start}
 .ttbl tr.open td.detail::before{display:inline-block;content:attr(data-label);flex:0 0 52px;font-weight:700;color:#64748b}
 .ttbl tr.open td.detail[data-label='상태']{margin-top:5px;border-top:1px dashed #e2e8f0;padding-top:7px}
 .ttbl tr.open td[data-label='주소']{background:#f8fafc;border-radius:6px}
}
</style></head><body>
<div class="wrap">
<header>
  <div><h1>게시판+오뚜기 출고 작업 대시보드</h1>
  <div class="subt">출고일/납기일 기준 · 데이터: 게시판제작공정시트 · 자동 갱신 · 생성 __GEN__</div></div>
  <div class="hright">
    <div class="searchbox">
      <input id="search" type="text" placeholder="🔍 업체명 검색 → 출고일 확인" autocomplete="off">
      <div class="sresults" id="sresults"></div>
    </div>
    <div class="checkin" id="checkin"></div>
    <button class="btn" id="printbtn" onclick="window.print()">🖨 A4 인쇄</button>
  </div>
</header>

<div class="panel" id="todayPanel">
  <div class="ptitle">
    <span>✅ 출고 체크리스트 <span class="tbadge" id="todayDate"></span></span>
    <span class="datenav">
      <button id="prevD" title="이전 날">◀</button>
      <input type="date" id="datePick">
      <button id="nextD" title="다음 날">▶</button>
      <button id="todayBtn">오늘</button>
      <span id="todaySum"></span>
    </span>
  </div>
  <div id="todayBox"></div>
</div>

<div class="panel">
  <div class="ptitle"><span>출고 달력 (월~금)</span><div class="tabs" id="monthTabs"></div></div>
  <div class="legend"><span><i style="background:#2563eb"></i>슬림디자인</span><span><i style="background:#059669"></i>슬림업</span><span><i style="background:#7c3aed"></i>강화유리</span><span><i style="background:#d97706"></i>인포</span> &nbsp;|&nbsp; <span><i style="background:#16a34a"></i>출고완료</span> &nbsp;|&nbsp; <span><i style="background:#2563eb"></i>게시판</span><span><i style="background:#ea580c"></i>오뚜기</span></div>
  <div id="calBox"></div>
</div>
<div class="foot">하나사인몰 웹팀 · 자동 생성 대시보드</div>
<div class="ovl" id="nameOvl" style="display:none"><div class="modal"><h2>👋 확인자 이름을 입력하세요</h2><p><span class="dev" id="mDev"></span> 로 접속하셨습니다. 출고 확인 담당자 이름을 선택하거나 입력해 주세요.</p><input class="ni" id="mInput" type="text" placeholder="직접 입력 (예: 홍길동)"><button class="ok" id="mOk">확인하고 시작</button></div></div>
</div>
<script>
let AGG=__AGG__;
let DET=__DET__;
const COL={'슬림디자인게시판':'#2563eb','슬림업게시판':'#059669','강화유리게시판':'#7c3aed','인포메이션':'#d97706'};
const SRCCOL={'게시판':'#2563eb','오뚜기':'#ea580c'};
const SHORT={'슬림디자인게시판':'슬림디자인','슬림업게시판':'슬림업','강화유리게시판':'강화유리','인포메이션':'인포'};
const TEAM=[];
function pad(n){return String(n).padStart(2,'0')}
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
const now=new Date();
const todayKey=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
const WK=['일','월','화','수','목','금','토'];

// ---- CHECKLIST (date navigable) ----
let selDate=todayKey;
function renderChecklist(key){
  selDate=key;
  const[Y,M,D]=key.split('-').map(Number);const dObj=new Date(Y,M-1,D);
  const isToday=key===todayKey;
  document.getElementById('todayDate').textContent=M+'/'+D+' ('+WK[dObj.getDay()]+')'+(isToday?' · 오늘':'');
  document.getElementById('datePick').value=key;
  const rows=DET[key]||[];const tq=rows.reduce((s,r)=>s+(+r.qty||0),0);
  if(rows.length){
    const dn=rows.filter(r=>r.done).length;document.getElementById('todaySum').innerHTML='총 '+rows.length+'건 · '+tq+'개 <span style="color:#16a34a;font-weight:700">(완료 '+dn+')</span>';
    let h='<table class="ttbl"><colgroup><col class="c-ck"><col class="c-st"><col class="c-gb"><col class="c-vn"><col class="c-pd"><col class="c-sz"><col class="c-qt"><col class="c-sh"><col class="c-tel"><col class="c-ad"></colgroup><thead><tr><th class="ck">✓</th><th>상태</th><th>구분</th><th>업체명</th><th>상품</th><th>사이즈</th><th class="qty">수량</th><th>배송</th><th>연락처</th><th>주소</th></tr></thead><tbody>';
    rows.forEach(r=>{const c=COL[r.product]||'#475569';
      const st=r.done?'<span class="stchip" style="background:#16a34a">출고완료</span>':'<span class="stchip" style="background:#dc2626">대기</span>';
      h+='<tr class="'+(r.done?'done':'')+'"><td class="ck"><input type="checkbox"'+(r.done?' checked':'')+'></td>'+
         '<td class="detail" data-label="상태">'+st+'</td>'+
         '<td class="detail" data-label="구분"><span class="stchip" style="background:'+(SRCCOL[r.src]||'#64748b')+'">'+esc(r.src||'')+'</span></td>'+
         '<td class="vn" data-label="업체">'+esc(r.vendor)+'</td>'+
         '<td data-label="상품"><span class="chip" style="background:'+c+'">'+esc(SHORT[r.product]||r.product)+'</span></td>'+
         '<td class="detail" data-label="사이즈">'+esc(r.size||'-')+'</td><td class="qty" data-label="수량">'+esc(r.qty)+'</td><td data-label="배송">'+esc(r.ship||'-')+'</td>'+
         '<td class="tel detail" data-label="연락처">'+esc(r.tel||'-')+'</td><td class="detail" data-label="주소">'+esc(r.addr||'-')+'</td></tr>'});
    h+='</tbody></table>';
    document.getElementById('todayBox').innerHTML=h;
  }else document.getElementById('todayBox').innerHTML='<div class="none">'+M+'/'+D+' 출고 예정 건이 없습니다.</div>';
}
function shiftDate(delta){const[Y,M,D]=selDate.split('-').map(Number);const d=new Date(Y,M-1,D);d.setDate(d.getDate()+delta);
  renderChecklist(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()))}
document.getElementById('prevD').onclick=()=>shiftDate(-1);
document.getElementById('nextD').onclick=()=>shiftDate(1);
document.getElementById('todayBtn').onclick=()=>renderChecklist(todayKey);
document.getElementById('datePick').onchange=function(){if(this.value)renderChecklist(this.value)};
renderChecklist(todayKey);

// ---- vendor index for search ----
let VEND={};
function buildVendorIndex(){VEND={};Object.keys(DET).forEach(k=>{DET[k].forEach(r=>{(VEND[r.vendor]=VEND[r.vendor]||[]).push({date:k,qty:+r.qty||0})})})}
buildVendorIndex();
const sEl=document.getElementById('search'),sRes=document.getElementById('sresults');
function fmt(d){const[y,m,dd]=d.split('-');return +m+'/'+dd+' ('+WK[new Date(+y,+m-1,+dd).getDay()]+')'}
sEl.addEventListener('input',()=>{
  const q=sEl.value.trim();if(!q){sRes.classList.remove('on');return}
  const hits=Object.keys(VEND).filter(v=>v.includes(q)).slice(0,30);
  if(!hits.length){sRes.innerHTML='<div class="sr none">검색 결과 없음</div>';sRes.classList.add('on');return}
  sRes.innerHTML=hits.map(v=>{
    const byDate={};VEND[v].forEach(x=>byDate[x.date]=(byDate[x.date]||0)+x.qty);
    const ds=Object.keys(byDate).sort().map(d=>'<b>'+fmt(d)+'</b> '+byDate[d]+'개').join(' · ');
    return '<div class="sr" data-d="'+Object.keys(byDate).sort()[0]+'"><div class="v">'+esc(v)+'</div><div class="d">출고일: '+ds+'</div></div>';
  }).join('');
  sRes.classList.add('on');
  [...sRes.querySelectorAll('.sr[data-d]')].forEach(el=>el.onclick=()=>{
    const d=el.getAttribute('data-d');const mk=d.slice(0,7);
    if(months.includes(mk)){curMonth=mk;syncTabs();renderCal(d)}
    sRes.classList.remove('on');sEl.value='';
  });
});
document.addEventListener('click',e=>{if(!e.target.closest('.searchbox'))sRes.classList.remove('on')});

// ---- check-in (담당자 이름) ----
const isMobile=/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
const devKey=isMobile?'mobile':'pc', devLabel=isMobile?'📱 모바일':'💻 PC';
function saveName(v){v=(v||'').trim();if(!v)return;
  const rec={name:v,time:(now.getMonth()+1)+'/'+now.getDate()+' '+pad(now.getHours())+':'+pad(now.getMinutes())};
  localStorage.setItem('checkin_'+devKey,JSON.stringify(rec));renderCheckin();}
function renderCheckin(edit){
  const saved=JSON.parse(localStorage.getItem('checkin_'+devKey)||'null');
  const box=document.getElementById('checkin');
  if(saved&&saved.name&&!edit){
    box.innerHTML='<span class="dev">'+devLabel+' 접속자</span><span class="nm">'+esc(saved.name)+'</span><button class="cibtn" id="ciEdit">변경</button>';
    document.getElementById('ciEdit').onclick=()=>renderCheckin(true);
  }else{
    box.innerHTML='<span class="dev">'+devLabel+' 접속자</span><input id="ciSel" type="text" placeholder="이름 입력" value="'+(saved?esc(saved.name):'')+'" style="width:90px"><button class="cibtn" id="ciSave">확인</button>';
    const el=document.getElementById('ciSel');el.focus();
    document.getElementById('ciSave').onclick=()=>saveName(el.value);
    el.addEventListener('keydown',e=>{if(e.key==='Enter')saveName(el.value)});
  }
}
renderCheckin();
// ---- first-visit name modal ----
(function(){
  const saved=JSON.parse(localStorage.getItem('checkin_'+devKey)||'null');
  if(saved&&saved.name)return;
  const ovl=document.getElementById('nameOvl');
  document.getElementById('mDev').textContent=devLabel;
  ovl.style.display='flex';
  function save(name){if(!name||!name.trim())return;
    const rec={name:name.trim(),time:(now.getMonth()+1)+'/'+now.getDate()+' '+pad(now.getHours())+':'+pad(now.getMinutes())};
    localStorage.setItem('checkin_'+devKey,JSON.stringify(rec));renderCheckin();ovl.style.display='none';}
  document.getElementById('mOk').onclick=()=>save(document.getElementById('mInput').value);
  document.getElementById('mInput').addEventListener('keydown',e=>{if(e.key==='Enter')save(e.target.value)});
})();

// ---- calendar ----
let months=[],curMonth=todayKey.slice(0,7);
const mt=document.getElementById('monthTabs');
function buildMonthTabs(){
  const keys=Object.keys(AGG).sort();
  months=[...new Set(keys.map(k=>k.slice(0,7)))];
  curMonth=months.includes(todayKey.slice(0,7))?todayKey.slice(0,7):(months[months.length-1]||todayKey.slice(0,7));
  mt.innerHTML='';
  months.forEach(m=>{const mm=+m.split('-')[1];const b=document.createElement('button');b.className='tab';b.dataset.m=m;b.textContent=mm+'월';b.onclick=()=>{curMonth=m;syncTabs();renderCal()};mt.appendChild(b)});
  syncTabs();
}
function syncTabs(){[...mt.children].forEach(c=>c.classList.toggle('on',c.dataset.m===curMonth))}
buildMonthTabs();
function renderCal(hlDate){
  const[y,m]=curMonth.split('-').map(Number);
  const first=new Date(y,m-1,1),dim=new Date(y,m,0).getDate();
  let cells=[],startW=(first.getDay()+6)%7;
  for(let i=0;i<startW;i++)cells.push(0);
  for(let d=1;d<=dim;d++)cells.push(d);
  while(cells.length%7)cells.push(0);
  let html='<table class="cal"><tr>'+['월','화','수','목','금'].map(d=>'<th>'+d+'</th>').join('')+'</tr>';
  for(let w=0;w<cells.length/7;w++){html+='<tr>';
    for(let i=0;i<5;i++){const day=cells[w*7+i];
      if(!day){html+='<td class="empty"></td>';continue}
      const key=y+'-'+pad(m)+'-'+pad(day);const cls=(key===todayKey?'today ':'')+(key===hlDate?'hl':'');
      if(AGG[key]){const d=AGG[key];const tdcls=(cls+(d.all_done?' alldone':'')).trim();
        let badge=d.all_done?'<span class="donebadge">✓완료</span>':'';
        const sc=d.src||{};
        const scStr=Object.keys(sc).map(k=>'<span style="color:'+(SRCCOL[k]||'#334155')+'">'+k+' '+sc[k]+'</span>').join(' / ');
        let c='<td class="'+tdcls+'"><div class="dn"><span>'+day+'</span><span>'+badge+'<span class="srccnt">'+scStr+'</span></span></div>';
        d.vendors.forEach(v=>{const pc=COL[v.products[0].name]||'#475569';const pl=v.products.map(p=>(SHORT[p.name]||p.name)+'<b>'+p.qty+'</b>').join(' ');
          const st=v.src?'<span class="srctag" style="background:'+(SRCCOL[v.src]||'#64748b')+'">'+esc(v.src[0])+'</span>':'';
          c+='<div class="it'+(v.done?' done':'')+'" style="--c:'+pc+'">'+st+'<span class="vn2">'+esc(v.vendor)+'</span> <span class="pq">'+pl+'</span></div>'});
        c+='</td>';html+=c;
      }else html+='<td class="'+cls.trim()+'"><div class="dn"><span>'+day+'</span></div></td>';
    }html+='</tr>';}
  html+='</table>';document.getElementById('calBox').innerHTML=html;
}
renderCal();
// mobile: tap row to expand details
document.getElementById('todayBox').addEventListener('click',e=>{
  if(e.target.closest('input'))return;
  const tr=e.target.closest('tr'); if(tr&&tr.parentElement.tagName==='TBODY')tr.classList.toggle('open');
});
</script>
